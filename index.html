<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snake</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --panel: #fffaf0;
        --border: #2b2b2b;
        --grid: #d8ccb5;
        --snake: #2f7d32;
        --snake-head: #1d4f20;
        --food: #b4432f;
        --text: #1f1a17;
        --muted: #6e6258;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .app {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .panel {
        width: min(100%, 540px);
        background: var(--panel);
        border: 2px solid var(--border);
        padding: 20px;
      }

      .hud,
      .status-bar,
      .controls-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .status-bar {
        margin: 16px 0 12px;
      }

      .label,
      .value,
      .help,
      #status {
        margin: 0;
      }

      .label,
      .help,
      #status {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .value {
        font-size: 1.6rem;
        font-weight: 700;
      }

      .button,
      .control {
        border: 2px solid var(--border);
        background: #f0e6d2;
        color: var(--text);
        padding: 10px 14px;
        font: inherit;
        cursor: pointer;
      }

      .button-secondary {
        background: #efe8dc;
      }

      .board {
        display: grid;
        gap: 2px;
        width: min(100vw - 88px, 480px);
        aspect-ratio: 1;
        background: var(--grid);
        border: 2px solid var(--border);
        padding: 2px;
      }

      .cell {
        background: #f8f2e6;
      }

      .cell-snake {
        background: var(--snake);
      }

      .cell-head {
        background: var(--snake-head);
      }

      .cell-food {
        background: var(--food);
      }

      .controls {
        display: grid;
        gap: 10px;
        justify-items: center;
        margin-top: 16px;
      }

      .control {
        min-width: 92px;
      }

      .help {
        margin-top: 16px;
      }

      @media (min-width: 700px) {
        .controls {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="hud">
          <div>
            <p class="label">Score</p>
            <p class="value" id="score">0</p>
          </div>
          <div>
            <p class="label">Best</p>
            <p class="value" id="best-score">0</p>
          </div>
          <button class="button" id="restart-button" type="button">Restart</button>
        </div>

        <div class="status-bar">
          <p id="status">Press an arrow key or WASD to start.</p>
          <button class="button button-secondary" id="pause-button" type="button">Pause</button>
        </div>

        <div id="board" class="board" role="grid" aria-label="Snake game board"></div>

        <div class="controls" aria-label="On-screen controls">
          <button class="control" type="button" data-direction="up">Up</button>
          <div class="controls-row">
            <button class="control" type="button" data-direction="left">Left</button>
            <button class="control" type="button" data-direction="down">Down</button>
            <button class="control" type="button" data-direction="right">Right</button>
          </div>
        </div>

        <p class="help">
          Controls: Arrow keys or WASD to move, Space or P to pause, Enter to restart after game over.
        </p>
      </section>
    </main>

    <script>
      const BOARD_SIZE = 16;
      const TICK_MS = 140;
      const INITIAL_DIRECTION = "right";

      const DIRECTION_VECTORS = {
        up: { x: 0, y: -1 },
        down: { x: 0, y: 1 },
        left: { x: -1, y: 0 },
        right: { x: 1, y: 0 }
      };

      const OPPOSITES = {
        up: "down",
        down: "up",
        left: "right",
        right: "left"
      };

      function createInitialState(size = BOARD_SIZE) {
        const center = Math.floor(size / 2);
        const snake = [
          { x: center, y: center },
          { x: center - 1, y: center },
          { x: center - 2, y: center }
        ];

        return {
          boardSize: size,
          snake,
          direction: INITIAL_DIRECTION,
          queuedDirection: INITIAL_DIRECTION,
          food: placeFood(snake, size),
          score: 0,
          isGameOver: false,
          isRunning: false,
          hasStarted: false
        };
      }

      function queueDirection(state, nextDirection) {
        if (!DIRECTION_VECTORS[nextDirection]) {
          return state;
        }

        const blockedDirection = state.hasStarted ? state.direction : state.queuedDirection;
        if (OPPOSITES[blockedDirection] === nextDirection) {
          return state;
        }

        return {
          ...state,
          queuedDirection: nextDirection,
          isRunning: !state.isGameOver,
          hasStarted: true
        };
      }

      function togglePause(state) {
        if (state.isGameOver || !state.hasStarted) {
          return state;
        }

        return {
          ...state,
          isRunning: !state.isRunning
        };
      }

      function tickState(state) {
        if (state.isGameOver || !state.isRunning) {
          return state;
        }

        const direction = state.queuedDirection;
        const vector = DIRECTION_VECTORS[direction];
        const nextHead = {
          x: state.snake[0].x + vector.x,
          y: state.snake[0].y + vector.y
        };
        const ateFood = positionsEqual(nextHead, state.food);
        const collisionBody = ateFood ? state.snake : state.snake.slice(0, -1);

        if (isOutOfBounds(nextHead, state.boardSize) || hitsSnake(nextHead, collisionBody)) {
          return {
            ...state,
            direction,
            isRunning: false,
            isGameOver: true
          };
        }

        const nextSnake = [nextHead, ...state.snake];
        if (!ateFood) {
          nextSnake.pop();
        }

        return {
          ...state,
          snake: nextSnake,
          direction,
          food: ateFood ? placeFood(nextSnake, state.boardSize) : state.food,
          score: ateFood ? state.score + 1 : state.score
        };
      }

      function placeFood(snake, boardSize) {
        const freeCells = [];

        for (let y = 0; y < boardSize; y += 1) {
          for (let x = 0; x < boardSize; x += 1) {
            if (!snake.some((segment) => segment.x === x && segment.y === y)) {
              freeCells.push({ x, y });
            }
          }
        }

        if (freeCells.length === 0) {
          return null;
        }

        const index = Math.floor(Math.random() * freeCells.length);
        return freeCells[index];
      }

      function createBoardCells(state) {
        const cells = Array.from({ length: state.boardSize * state.boardSize }, () => "cell");

        state.snake.forEach((segment, index) => {
          const cellIndex = segment.y * state.boardSize + segment.x;
          cells[cellIndex] = index === 0 ? "cell cell-snake cell-head" : "cell cell-snake";
        });

        if (state.food) {
          const foodIndex = state.food.y * state.boardSize + state.food.x;
          cells[foodIndex] = "cell cell-food";
        }

        return cells;
      }

      function isOutOfBounds(position, boardSize) {
        return (
          position.x < 0 ||
          position.x >= boardSize ||
          position.y < 0 ||
          position.y >= boardSize
        );
      }

      function hitsSnake(head, snake) {
        return snake.some((segment) => positionsEqual(segment, head));
      }

      function positionsEqual(a, b) {
        return Boolean(a && b) && a.x === b.x && a.y === b.y;
      }

      const boardElement = document.querySelector("#board");
      const scoreElement = document.querySelector("#score");
      const bestScoreElement = document.querySelector("#best-score");
      const statusElement = document.querySelector("#status");
      const restartButton = document.querySelector("#restart-button");
      const pauseButton = document.querySelector("#pause-button");
      const controlButtons = document.querySelectorAll("[data-direction]");

      const storedBest = Number.parseInt(localStorage.getItem("snake-best-score") || "0", 10);
      let bestScore = Number.isFinite(storedBest) ? storedBest : 0;
      let state = createInitialState();

      boardElement.style.gridTemplateColumns = `repeat(${BOARD_SIZE}, 1fr)`;

      for (let index = 0; index < BOARD_SIZE * BOARD_SIZE; index += 1) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.setAttribute("role", "gridcell");
        boardElement.append(cell);
      }

      const cellElements = [...boardElement.children];

      function render() {
        const classes = createBoardCells(state);
        classes.forEach((className, index) => {
          cellElements[index].className = className;
        });

        scoreElement.textContent = String(state.score);
        bestScoreElement.textContent = String(bestScore);
        pauseButton.textContent = state.isRunning ? "Pause" : "Resume";

        if (state.isGameOver) {
          statusElement.textContent = "Game over. Press Restart or Enter to play again.";
          return;
        }

        if (!state.hasStarted) {
          statusElement.textContent = "Press an arrow key or WASD to start.";
          return;
        }

        statusElement.textContent = state.isRunning ? "Running" : "Paused";
      }

      function syncBestScore() {
        if (state.score > bestScore) {
          bestScore = state.score;
          localStorage.setItem("snake-best-score", String(bestScore));
        }
      }

      function resetGame() {
        state = createInitialState();
        render();
      }

      function handleDirection(nextDirection) {
        state = queueDirection(state, nextDirection);
        render();
      }

      function gameLoop() {
        state = tickState(state);
        syncBestScore();
        render();
      }

      const keyToDirection = {
        ArrowUp: "up",
        ArrowDown: "down",
        ArrowLeft: "left",
        ArrowRight: "right",
        w: "up",
        W: "up",
        a: "left",
        A: "left",
        s: "down",
        S: "down",
        d: "right",
        D: "right"
      };

      document.addEventListener("keydown", (event) => {
        const direction = keyToDirection[event.key];
        if (direction) {
          event.preventDefault();
          handleDirection(direction);
          return;
        }

        if (event.key === " " || event.key === "p" || event.key === "P") {
          event.preventDefault();
          state = togglePause(state);
          render();
          return;
        }

        if (event.key === "Enter" && state.isGameOver) {
          resetGame();
        }
      });

      restartButton.addEventListener("click", resetGame);
      pauseButton.addEventListener("click", () => {
        state = togglePause(state);
        render();
      });

      controlButtons.forEach((button) => {
        button.addEventListener("click", () => {
          handleDirection(button.dataset.direction);
        });
      });

      setInterval(gameLoop, TICK_MS);
      render();
    </script>
  </body>
</html>
